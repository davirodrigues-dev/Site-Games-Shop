<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <title>Produtos - Game Shop</title>
</head>
<body>
    <header>
        <div class="cabecalho">
            <h1>Games Shop</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Voltar ao Início</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <section>
        <div class="container">
            <h2>Catálogo de Jogos</h2>
            <div class="produtos">
                <div class="produtosDarkSouls">
                    <img src="/imagem/darksouls.png" alt="imagem Dark Souls">
                    <h3>DARK SOULS</h3>
                    <p>R$ 25,00</p>
                    <button class="btnComprar">Comprar</button>
                </div>
                <div class="produtosGodOfWar">
                    <img src="/imagem/godofwar.png" alt="imagem God Of War">
                    <h3>God Of War</h3>
                    <p>R$ 20,00</p>
                    <button class="btnComprar">Comprar</button>
                </div>
                <div class="produtosSpiderMan">
                    <img src="/imagem/spiderman.png" alt="imagem Spiderman">
                    <h3>Spider-man</h3>
                    <p>R$ 23,99</p>
                    <button class="btnComprar">Comprar</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
